version: "3.8"

services:
  # ================================
  # Next.js Development Server
  # ================================
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: marketplace-mediator-dev
    restart: unless-stopped
    ports:
      - "9090:9090"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://192.168.1.4:8080/api}
      - NEXT_PUBLIC_API_URL_IMAGES=${NEXT_PUBLIC_API_URL_IMAGES:-http://192.168.1.4:8080/uploads/}
      - WATCHPACK_POLLING=true
    volumes:
      # Mount source code for hot-reload
      - .:/app
      # Prevent node_modules from being overwritten
      - /app/node_modules
      - /app/.next
    networks:
      - marketplace-network

networks:
  marketplace-network:
    driver: bridge
