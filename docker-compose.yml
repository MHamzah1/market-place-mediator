version: "3.8"

services:
  # ================================
  # Next.js Application
  # ================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: marketplace-mediator-app
    restart: unless-stopped
    ports:
      - "9090:9090" # Akses via localhost:9090, internal tetap 9090
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://192.168.2.103:3000/api}
      - NEXT_PUBLIC_API_URL_FOTO=${NEXT_PUBLIC_API_URL_FOTO:-http://192.168.2.103:3000/uploads/}
    networks:
      - marketplace-network
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://192.168.0.182:3000/",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ================================
  # Nginx Reverse Proxy (Optional)
  # ================================
  nginx:
    image: nginx:alpine
    container_name: marketplace-mediator-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - marketplace-network
    profiles:
      - with-nginx

networks:
  marketplace-network:
    driver: bridge
